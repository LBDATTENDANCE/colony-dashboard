<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
  <style>
    /* ... (Keep all your existing CSS styles from the previous version) ... */
    body { font-family: 'Lexend', sans-serif; margin: 0; padding: 20px; background-color: #f1f3f5; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 120px; }
    .logo-container { position: absolute; left: 30px; top: 25px; cursor: pointer; }
    .logo-img { max-height: 60px; width: auto; }
    .titles-container { text-align: center; }
    h1 { margin: 0; color: #000; font-weight: 900; font-size: 38px; text-transform: uppercase; letter-spacing: -1.5px; }
    h2 { margin: 5px 0 0 0; color: #666; font-weight: 600; font-size: 18px; letter-spacing: 1px; }
    .selector-wrapper { position: absolute; bottom: 20px; right: 30px; }
    .selector-group { background: #fff; padding: 5px 15px; border-radius: 10px; border: 2px solid #000; display: flex; align-items: center; gap: 10px; }
    select { font-family: 'Lexend'; padding: 5px 10px; border: 1px solid #ccc; border-radius: 5px; font-weight: 800; color: #000; }
    .winner-box { background: #fff; padding: 30px 40px; border-radius: 15px; border: 3px solid #000; margin-bottom: 25px; text-align: center; }
    .highlight-gold { color: #D4AF37; font-weight: 900; font-size: 1.1em; }
    .main-content { display: flex; gap: 20px; margin-bottom: 30px; }
    .chart-area { flex: 2.5; background: #fff; padding: 25px; border-radius: 20px; height: 500px; }
    .score-card { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
    .table-section { background: #fff; padding: 30px; border-radius: 20px; margin-bottom: 40px; }
    .nav-container { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 25px; }
    .nav-btn { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f9fa; padding: 15px; border-bottom: 2px solid #000; }
    td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-container" onclick="window.print()"><img src="https://i0.wp.com/lbdnation.org/wp-content/uploads/2024/06/LBD_LOGO_HORIZONTAL.png?w=446&ssl=1" class="logo-img"></div>
    <div class="titles-container">
      <h1>COLONY MONTHLY DASHBOARD</h1>
      <h2>BETHEL PERFORMANCE INDEX • MARCH 2026</h2>
    </div>
    <div class="selector-wrapper">
      <div class="selector-group"><label>DATE:</label><select id="datePicker" onchange="updateDashboard()"></select></div>
    </div>
  </div>

  <div class="winner-box">
    <div class="winner-intro">TODAY'S WINNER IS THE <span id="winColony" class="highlight-gold">---</span> COLONY, LED BY REGENT <span id="winRegent" class="highlight-gold">---</span> WITH A SCORE OF <span id="winScore" class="highlight-gold">---</span>.</div>
  </div>

  <div class="main-content">
    <div class="chart-area"><canvas id="colonyChart"></canvas></div>
    <div class="score-card" id="card">
      <div style="font-weight:700; color: #666;">TOTAL ATTENDANCE</div>
      <div id="totalVal" style="font-size:85px; font-weight:900;">0</div>
      <div style="font-weight:600; color: #888;">GOAL: 1,000 KINSMEN</div>
    </div>
  </div>

  <div class="table-section">
    <div class="nav-container">
      <button class="nav-btn" onclick="moveWeek(-1)">← PREVIOUS</button>
      <div id="weekLabel" style="font-weight:800;">WEEK 1</div>
      <button class="nav-btn" onclick="moveWeek(1)">NEXT →</button>
    </div>
    <table id="attendanceTable">
      <thead><tr id="tableHeader"><th>COLONY</th><th>REGENT</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  // PASTE YOUR GOOGLE WEB APP URL HERE
  const scriptURL = "https://script.google.com/macros/s/AKfycbwK_x4EoQl7sa19Es4IjJGaPPyITQHIAaf1mUaffSXV8T1V3c_EN-Tx5-W9ypKe3sbI/exec";
  
  let chartInstance;
  let currentWeek = 0;
  Chart.register(ChartDataLabels);

  window.onload = () => {
    fetch(`${scriptURL}?action=getDates`)
      .then(res => res.json())
      .then(dates => {
        const sel = document.getElementById('datePicker');
        dates.forEach(d => { let opt = document.createElement('option'); opt.value = opt.text = d; sel.add(opt); });
        updateDashboard();
        updateTable();
      });
  };

  function updateDashboard() {
    const date = document.getElementById('datePicker').value;
    fetch(`${scriptURL}?action=getDashboard&date=${date}`)
      .then(res => res.json())
      .then(data => {
        if (data.rows.length === 0) return;
        let winner = data.rows.reduce((prev, current) => (prev.attendance > current.attendance) ? prev : current);
        document.getElementById('winColony').innerText = winner.colony;
        document.getElementById('winRegent').innerText = winner.regent;
        document.getElementById('winScore').innerText = winner.attendance;
        document.getElementById('totalVal').innerText = data.total;
        
        const card = document.getElementById('card');
        card.style.backgroundColor = data.total < 720 ? "#ffcdd2" : (data.total < 900 ? "#fff9c4" : "#c8e6c9");

        if(chartInstance) chartInstance.destroy();
        const ctx = document.getElementById('colonyChart').getContext('2d');
        chartInstance = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: data.rows.map(r => r.colony),
            datasets: [{
              data: data.rows.map(r => r.attendance),
              backgroundColor: data.rows.map(r => r.attendance >= 300 ? '#D4AF37' : '#4caf50'),
              borderRadius: 5
            }]
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false, datalabels: { anchor: 'end', align: 'top' } } }
        });
      });
  }

  function moveWeek(dir) { currentWeek += dir; updateTable(); }

  function updateTable() {
    fetch(`${scriptURL}?action=getTable&week=${currentWeek}`)
      .then(res => res.json())
      .then(data => {
        const head = document.getElementById('tableHeader');
        const body = document.getElementById('tableBody');
        head.innerHTML = '<th>COLONY</th><th>REGENT</th>';
        data.headers.forEach(d => head.innerHTML += `<th>DAY ${d}</th>`);
        body.innerHTML = '';
        data.rows.forEach(r => {
          let tr = `<tr><td style="font-weight:900;">${r.colony}</td><td>${r.regent}</td>`;
          r.attendanceRange.forEach(v => tr += `<td>${v}</td>`);
          body.innerHTML += tr + '</tr>';
        });
      });
  }
</script>
</body>
</html>
